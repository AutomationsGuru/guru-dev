name: Release

# Tag-triggered npm publish with provenance. Cut a release with:
#   git tag v1.5.0 && git push guru-dev v1.5.0
#
# Requires the NPM_TOKEN repository secret (an npm automation token with
# publish rights for the `guruharness` package). Until that secret exists the
# publish step fails with a clear message and nothing is published.
# Alternative: configure npm Trusted Publishing for this repo on npmjs.com and
# swap the token for OIDC.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release
  id-token: write # npm --provenance attestation

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install Node dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Enforce 1.5.x release line (no 1.6+ until Matthew accepts)
        run: |
          # Dogfood stays on 1.5.x indefinitely — patches may climb (1.5.1 … 1.5.n).
          # 1.6.0 or higher requires Matthew's explicit "working well enough" acceptance.
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if ! node -e '
            const v = process.argv[1];
            const m = /^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(v);
            if (!m) { console.error("unparseable version: " + v); process.exit(2); }
            const major = Number(m[1]);
            const minor = Number(m[2]);
            if (major !== 1 || minor !== 5) {
              console.error(
                "Refusing to publish " + v + ": approved release line is 1.5.x only. " +
                "1.6.0+ is blocked until Matthew explicitly accepts Guru as working well enough."
              );
              process.exit(1);
            }
            console.log("Release line OK: " + v + " is on 1.5.x");
          ' "$PKG_VERSION"; then
            echo "::error::Release blocked: package version must remain on 1.5.x until Matthew unlocks 1.6+"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm (with provenance)
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured — add an npm automation token with publish rights for 'guruharness' to the repository secrets."
            exit 1
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
